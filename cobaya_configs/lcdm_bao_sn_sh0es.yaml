packages_path: ./cobaya_packages

likelihood:
  theory_module.bao_desi_likelihood.BAODESILikelihood:
    python_path: .
    data_path: ./cobaya_packages/data/bao_data/desi_bao_dr2
  sn.pantheonplus: null # Funciona perfeitamente e fará a marginalização nativa
  theory_module.sh0es_likelihood.SH0ESLikelihood:
    python_path: .

params:
  H0:
    prior: { min: 60, max: 80 }
    ref: 68.0
    proposal: 0.5
  Omega_m:
    prior: { min: 0.2, max: 0.4 }
    ref: 0.315
    proposal: 0.005
  alpha_q:
    value: 0.0 # <--- Desliga a correção da USF, reduzindo ao ΛCDM puro
  z_trans:
    value: 2.0 # <--- Fixo, pois não tem efeito com alpha_q = 0

theory:
  theory_module.feu_background.FEU:
    python_path: .

output: chains/lcdm_bao_sn_sh0es
sampler:
  mcmc:
    Rminus1_stop: 0.01
    max_tries: 10000
